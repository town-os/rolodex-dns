database_path: /tmp/rolodex-dns-dev.db
forwarders:
  - "8.8.8.8:53"
  - "8.8.4.4:53"

# Bind addresses accept ip:port, [ipv6]:port, or interface:port.
# Interface binding resolves all IPs on the named interface, e.g.:
#   udp_bind: "eth0:5300"       # bind to all IPs on eth0
#   udp_bind: "lo:5300"         # bind to 127.0.0.1 via loopback
#   udp_bind:                   # multiple addresses
#     - "eth0:5300"
#     - "127.0.0.1:5300"
dns:
  udp_bind: "127.0.0.1:5300"
  tcp_bind: "127.0.0.1:5300"

grpc:
  tcp_bind: ""
  unix_socket: /tmp/rolodex-dns.sock
  shared_secret: ""

rbl:
  enabled: false
  providers: []

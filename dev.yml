database_path: /tmp/rolodex-dns-dev.db
forwarders:
  - "8.8.8.8:53"
  - "8.8.4.4:53"

# Each entry is a protocol (udp/tcp) mapped to a bind address.
# Bind addresses accept ip:port, [ipv6]:port, primary:port, or interface:port.
dns:
  bind:
    - udp: "127.0.0.1:5300"
    - tcp: "127.0.0.1:5300"
    - udp: "primary:5300"
    - tcp: "primary:5300"

grpc:
  tcp_bind: ""
  unix_socket: /tmp/rolodex-dns.sock
  shared_secret: ""

rbl:
  enabled: false
  providers: []

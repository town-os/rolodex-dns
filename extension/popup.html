<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  body { font-family: system-ui, sans-serif; width: 360px; margin: 0; padding: 12px;
         color-scheme: light dark; }
  h1 { font-size: 1.05rem; margin: 0 0 .5rem; }
  label { display: block; font-weight: 600; margin: .5rem 0 .2rem; font-size: .85rem; }
  input, select { width: 100%; box-sizing: border-box; padding: .4rem; border-radius: 6px;
                  border: 1px solid #8886; font-size: .9rem; }
  button { margin-top: .6rem; padding: .45rem .8rem; border: 0; border-radius: 6px;
           background: #2563eb; color: #fff; cursor: pointer; font-size: .9rem; }
  button.secondary { background: #6b7280; }
  pre { background: #8881; border-radius: 6px; padding: .5rem; white-space: pre-wrap;
        word-break: break-all; font-size: .78rem; max-height: 220px; overflow: auto; }
  .muted { color: #6b7280; font-size: .78rem; }
  .hidden { display: none; }
  .row { display: flex; gap: .4rem; }
  .row > * { flex: 1; }
</style>
</head>
<body>
  <h1>Rolodex DNS Enrollment</h1>

  <label for="portal">Portal URL</label>
  <input id="portal" type="url" placeholder="https://dns.example.com:8500" />

  <label for="zone">Zone</label>
  <div class="row">
    <select id="zone"></select>
    <button id="load" class="secondary">Load</button>
  </div>

  <button id="enroll">Enroll</button>
  <button id="ca" class="secondary">Download root CA</button>

  <div id="out" class="hidden">
    <label>EAB credentials & client config</label>
    <pre id="result"></pre>
  </div>

  <hr style="border: 0; border-top: 1px solid #8884; margin: .9rem 0" />
  <h1>CA via DNS</h1>
  <p class="muted">
    Retrieve the CA chain from DNS itself (CERT records, TXT fallback) over
    DoH — no portal access needed, only DNS reachability.
  </p>

  <label for="doh">DoH URL</label>
  <input id="doh" type="url" placeholder="https://dns.example.com/dns-query" />

  <label for="dns-zone">Zone</label>
  <input id="dns-zone" type="text" placeholder="example.com" />

  <label for="dane-name">Verify against DANE TLSA of (optional)</label>
  <input id="dane-name" type="text" placeholder="host.example.com" />

  <button id="fetch-ca">Fetch CA via DNS</button>

  <div id="dns-out" class="hidden">
    <pre id="dns-result"></pre>
    <div class="row">
      <button id="dl-root" class="secondary">Root PEM</button>
      <button id="dl-int" class="secondary">Intermediate PEM</button>
      <button id="dl-chain" class="secondary">Chain PEM</button>
    </div>
  </div>
  <p id="status" class="muted"></p>

  <script type="module" src="popup.js"></script>
</body>
</html>
